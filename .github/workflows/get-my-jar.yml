name: Build_OFDRW_Fat_Jar_2026

on:
  workflow_dispatch: 

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-fat-jar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Build Fat Jar
        # 我们直接对 ofdrw-full 模块进行打包，并包含所有依赖
        run: |
          mvn clean package -DskipTests -pl ofdrw-full -am \
          -Dmaven.test.skip=true \
          -Dshade.createDependencyReducedPom=false
          
          # 进入 ofdrw-full 目录尝试寻找生成的 big jar
          # 如果官方 pom 没写 shader，我们用 dependency:copy 把所有包弄到一个目录再用 jar 命令压在一起
          mkdir -p combined
          mvn dependency:copy-dependencies -DoutputDirectory=combined -pl ofdrw-full -am -DincludeScope=runtime
          cp ofdrw-full/target/ofdrw-full-*.jar combined/
          
          # 暴力合并：把所有 jar 包解压到一个地方，再打成一个大包
          mkdir -p fat_contents
          cd combined
          for f in *.jar; do unzip -o $f -d ../fat_contents/; done
          cd ../fat_contents
          # 移除签名文件防止冲突
          rm -rf META-INF/*.SF META-INF/*.DSA META-INF/*.RSA
          jar -cvf ../OFDRW-All-In-One.jar .

      - name: Upload Fat Jar
        uses: actions/upload-artifact@v4
        with:
          name: OFDRW-Single-Jar-2026
          path: OFDRW-All-In-One.jar
