name: OFDRW_Standard_Lib_2026

on:
  workflow_dispatch: 

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  collect-all-jars:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Build and Export All
        run: |
          # 1. 编译全模块
          mvn clean package -DskipTests
          
          # 2. 创建一个存放所有包的目录
          mkdir -p web_lib
          
          # 3. 核心步骤：进入 converter 模块（这是转 PDF 的核心）导出它及其所有依赖
          # 这步会把 PDFBox, BouncyCastle 等全部抓出来
          mvn dependency:copy-dependencies -DoutputDirectory=../../web_lib -pl ofdrw-converter -am -DincludeScope=runtime
          
          # 4. 把编译好的 ofdrw 各个模块也拷贝进去
          find . -name "ofdrw-*.jar" -not -path "*/test-classes/*" -not -path "*/web_lib/*" -exec cp {} ./web_lib/ \;

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: OFDRW_Lib_For_Web
          path: web_lib/
