name: Build_OFDRW_Success_Version

on:
  workflow_dispatch: 

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: 'maven'

      - name: Maven Build
        # 执行编译
        run: mvn clean package -DskipTests

      - name: Collect Files Forcefully
        # 这一步是关键：创建一个新文件夹，把所有子模块 target 里的 jar 都抓过来
        run: |
          mkdir -p my_delivery
          find . -name "*.jar" -not -path "*/test-classes/*" -exec cp {} ./my_delivery/ \;
          echo "--- 确认抓取到的文件列表 ---"
          ls -lh ./my_delivery/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ofdrw-jar-package-2026
          # 注意：这里的 path 指向我们刚才手动创建并填满的文件夹
          path: my_delivery/
          if-no-files-found: error
