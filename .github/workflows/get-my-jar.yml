name: OFDRW_Final_Collector_2026

on:
  workflow_dispatch: 

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and Copy Dependencies
        # 这一步是灵魂：除了编译，还让 Maven 把所有依赖包（PDFBox等）全部导出
        run: |
          mvn clean package -DskipTests
          mvn dependency:copy-dependencies -DoutputDirectory=my_delivery/lib

      - name: Collect OFDRW Jars
        # 搜刮 OFDRW 自己生成的模块包
        run: |
          find . -name "ofdrw-*.jar" -not -path "*/test-classes/*" -not -path "*/my_delivery/*" -exec cp {} ./my_delivery/ \;
          echo "--- 文件准备就绪 ---"
          ls -R ./my_delivery/

      - name: Upload Everything
        uses: actions/upload-artifact@v4
        with:
          name: OFDRW_WEB_READY_PACK
          path: my_delivery/
          if-no-files-found: error
