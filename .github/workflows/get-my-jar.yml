name: OFDRW_Double_Build_2026

on:
  workflow_dispatch: 

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # 任务一：纯净版 (既然你已经成功了，可以保留也可以删掉)
  build_core_only:
    name: Build Pure OFDRW Jars
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
      - name: Compile
        run: mvn clean package -DskipTests
      - name: Collect
        run: |
          mkdir -p pure_jars
          find . -name "ofdrw-*.jar" -not -path "*/test-classes/*" -exec cp {} pure_jars/ \;
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: 1-OFDRW-Core-Only
          path: pure_jars/

  # 任务二：全家桶版 (针对失败进行的修复)
  build_with_dependencies:
    name: Build Full Bundle (Web Ready)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: 'maven'
      
      - name: Compile
        run: mvn clean package -DskipTests

      - name: Force Export Dependencies
        # 即使某个模块导出失败也继续执行
        run: |
          mkdir -p all_in_one_bundle
          mvn dependency:copy-dependencies -DoutputDirectory=all_in_one_bundle -DincludeScope=runtime || true

      - name: Collect OFDRW Modules
        # 把核心包也抓进同一个文件夹
        run: |
          find . -name "ofdrw-*.jar" -not -path "*/test-classes/*" -not -path "*/all_in_one_bundle/*" -exec cp {} all_in_one_bundle/ \;
          echo "Checking total files count:"
          ls -1 all_in_one_bundle | wc -l

      - name: Upload Full
        uses: actions/upload-artifact@v4
        with:
          name: 2-OFDRW-Full-Bundle-Fixed
          # 指向这个确定的文件夹
          path: all_in_one_bundle/
          if-no-files-found: error
