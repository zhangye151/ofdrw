name: Build OFDRW JAR 2026

on:
  workflow_dispatch: # 允许你手动点击按钮触发

env:
  # 解决 Node.js 20 弃用警告
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        # package 命令会编译并生成 jar 包
        run: mvn clean package -DskipTests

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ofdrw-all-modules
          # 关键修改：使用递归通配符找到所有子模块 target 里的 jar
          path: "**/target/*.jar"
          # 排除源码包和文档包，只拿运行包（可选，如果不介意文件多可以删掉这两行）
          # exclude: |
          #   **/target/*-sources.jar
          #   **/target/*-javadoc.jar
