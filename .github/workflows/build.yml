name: Build_OFDRW_Success_Version

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: 'maven'

      - name: Maven Build
        run: mvn -B clean package -DskipTests

      - name: Collect jar files
        run: |
          mkdir -p my_delivery
          find . -type f -name "*.jar" \
            ! -name "*sources.jar" \
            ! -name "*javadoc.jar" \
            ! -path "*/test/*" \
            -exec cp {} my_delivery/ \;

          echo "===== JAR FILE LIST ====="
          ls -lh my_delivery

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ofdrw-jar-package
          path: my_delivery/
