name: Build OFDRW JAR (Node 24 Ready)

on:
  workflow_dispatch: 

env:
  # 解决你遇到的警告：强制 Action 使用 Node.js 24 运行
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # 即使版本号没变，设置了 env 也会在 Node 24 下运行

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        # clean package 会在每个模块的 target 下生成 JAR
        run: mvn clean package -DskipTests

      - name: Upload Artifact
              uses: actions/upload-artifact@v4
              with:
                name: ofdrw-all-jars
                # 使用 **/ 匹配所有子目录下的 target 文件夹
                path: "**/target/*.jar"
                # 如果只想保留主 JAR，排除那些源码包或文档包（可选）
                if-no-files-found: error
